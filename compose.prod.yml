services:
  frontend:
    build:
      context: frontend              
      dockerfile: Dockerfile
    environment:
        BACKEND_URL: http://backend:80
    depends_on: 
        - backend
    restart: always
    healthcheck:
      # Use curl to check the local index page; -f fails silently on server errors
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: backend              
      dockerfile: Dockerfile
    environment:
      WORKER_ADDRESS: tcp://worker:80
      PORT: 80
    depends_on: 
        - worker
    restart: always
    healthcheck:
      # Use curl to check the local index page; -f fails silently on server errors
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: worker
      dockerfile: Dockerfile
    environment:
      PORT: 80
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker-alive && find /tmp/worker-alive -mmin -2 | grep -q ."]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_signal: SIGINT